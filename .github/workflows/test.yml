name: Tests

on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install runtime + test deps
        run: pip install ezdxf flask pytest

      - name: Run tests
        working-directory: ${{ github.workspace }}
        run: pytest tests/ -v
